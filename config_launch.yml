objective:
  Linear Regression:
    device: "cuda"

dataset:
  simulated:
    n: [32768]
    d1: [2000, 4000, 8000]

solver:
  all-reduce:
    batch_size: [64, 512, 2048, 8192]
    lr: [1e-3]
    slurm_nodes: [4]
    slurm_gpus_per_node: [1]

parallel_config: config_parallel.yml
n_repetitions: 5
timeout: 100000